# Phase 39.2 — Multi-OS signed Tauri build via GitHub Actions.
#
# Trigger: push of a version tag (`v*.*.*`) OR manual workflow_dispatch.
# Builds Linux + Windows + macOS in parallel, signs with the Tauri
# minisign key, attaches all bundles + .sig files to the GitHub release.
#
# Required secrets (Repo Settings → Secrets and variables → Actions):
#   - TAURI_SIGNING_PRIVATE_KEY           contents of ~/.tauri/agentcontrol.key
#   - TAURI_SIGNING_PRIVATE_KEY_PASSWORD  the passphrase used at key generation
#   - (GITHUB_TOKEN is provided automatically; used for release upload)

name: Build & Release Tray

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to build (e.g. v0.1.0)'
        required: true
        type: string

# Opt JavaScript actions into Node.js 24 (default June 16, 2026; Node 20
# removed September 16, 2026). Avoids the deprecation warning surfaced
# in the v0.1.1 build annotations.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

# Cancel any in-progress run on the same ref (e.g. amended tag pushes,
# re-triggered workflow_dispatch). Saves free-tier minutes when an
# operator iterates on a release.
concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    permissions:
      contents: write   # required to create / upload to releases
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            label: linux
            rust-target: x86_64-unknown-linux-gnu
            args: ''
          # Universal build: lipo's aarch64 + x86_64 into one bundle so a
          # single artifact serves both Apple Silicon and Intel Macs. The
          # `app` bundle target is what emits the updater payload
          # (`.app.tar.gz` + `.sig`) — `dmg` alone produces NO updater
          # artifact, which is why v0.5.0's latest.json had no darwin keys
          # and Macs got no auto-updates (caught by updater-validator).
          # tauri-action writes BOTH darwin-aarch64 and darwin-x86_64 keys
          # for a universal build, pointing at the same `.app.tar.gz`.
          - platform: macos-14
            label: macos
            rust-target: aarch64-apple-darwin x86_64-apple-darwin
            args: '--target universal-apple-darwin --bundles app,dmg'
          # Windows: NSIS bundle. The tray is a persistent menu-bar app
          # (Tailscale-pattern), so the install step IS what we want —
          # tray.exe lives in Programs Files + Start Menu, autoruns on
          # login, persists. The "portable wizard" pattern only applied
          # to the now-deprecated one-shot installer.
          - platform: windows-latest
            label: windows
            rust-target: x86_64-pc-windows-msvc
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      # Swatinem/rust-cache is the de-facto Rust caching action. Smarter
      # than vanilla actions/cache: keys on Cargo.toml + Cargo.lock, only
      # caches dep crates (not local crate's incremental artifacts), and
      # auto-prunes to stay under the 10GB per-repo cache limit. Typical
      # 30-50% speedup on warm cache.
      - name: Cache Rust deps (Swatinem)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.platform }}-${{ matrix.rust-target }}
          # Save cache only on main / tag pushes — saves write quota on PRs
          save-if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # 20 → 22 (LTS). 22 has better Tauri 2 + native module compat.
          node-version: 22
          cache: pnpm

      # pnpm setup-node already caches the pnpm store via `cache: pnpm`,
      # but only restores per-OS. Add an explicit step for the frontend
      # build's vite/rollup deps which benefit from per-platform caching.
      - name: Install web deps
        run: pnpm install --frozen-lockfile --prefer-offline

      # Phase 55.3.0 — the bridge is no longer bundled as a Tauri
      # resource. The folded-in onboarding flow installs it (WSL + Ubuntu
      # + Node + Claude CLI + systemctl --user service) on first run, so
      # there is no sibling-repo checkout or bundle-bridge.sh step here.

      # Sync the version field in tauri.conf.json + package.json with the
      # git tag (or workflow_dispatch input). Single source of truth: the
      # tag. No commit needed — the patched files only exist on the
      # runner long enough for tauri-action to bundle them in. This
      # closes the v0.1.1 cosmetic honest-rot where bundle filenames
      # said "0.1.0" because the in-repo version field was stale.
      - name: Derive + sync version from tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${INPUT_VERSION#v}"
          else
            VERSION="dev"
          fi
          echo "Resolved version: $VERSION"
          # Patch both files in place; jq is preinstalled on all 3 runners
          tmp=$(mktemp)
          jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > "$tmp" && mv "$tmp" src-tauri/tauri.conf.json
          tmp=$(mktemp)
          jq --arg v "$VERSION" '.version = $v' package.json > "$tmp" && mv "$tmp" package.json
          echo "tauri.conf.json: $(jq -r .version src-tauri/tauri.conf.json)"
          echo "package.json:    $(jq -r .version package.json)"
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}

      - name: Build & sign via tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Phase 55.4 — bake the deployment host into the bundle so the
          # same tray binary can target a different self-hosted Caddy
          # without code surgery. TS side reads `import.meta.env.VITE_*`;
          # Rust side reads `option_env!("HETZNER_HOST")`. Both fall back
          # to `178.105.244.59` (this user's CX23) if unset, so the
          # default build keeps working without secrets configured.
          HETZNER_HOST: ${{ vars.HETZNER_HOST }}
          VITE_HETZNER_HOST: ${{ vars.HETZNER_HOST }}
        with:
          # tagName / releaseName / releaseBody used only when this action
          # creates the release. We rely on push-tag triggering creating
          # the release in the FIRST matrix job; subsequent jobs upload
          # to the same release via tagName lookup.
          tagName: ${{ github.event.inputs.version || github.ref_name }}
          releaseName: 'AgentControl Tray ${{ github.event.inputs.version || github.ref_name }}'
          releaseBody: |
            Multi-OS signed release built via GitHub Actions.
            See `latest.json` for updater-plugin consumption.

            Signed with operator-managed Tauri minisign key.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload artifacts (raw, for non-release runs)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.version == ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}-bundles
          path: |
            src-tauri/target/**/release/bundle/**/*.AppImage*
            src-tauri/target/**/release/bundle/**/*.deb*
            src-tauri/target/**/release/bundle/**/*.rpm*
            src-tauri/target/**/release/bundle/**/*.dmg*
            src-tauri/target/**/release/bundle/**/*.app.tar.gz*
            src-tauri/target/**/release/bundle/**/*.msi*
            src-tauri/target/**/release/bundle/**/*.exe*
            src-tauri/target/**/release/bundle/**/*.nsis.zip*
          retention-days: 7
