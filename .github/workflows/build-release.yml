# Phase 39.2 — Multi-OS signed Tauri build via GitHub Actions.
#
# Trigger: push of a version tag (`v*.*.*`) OR manual workflow_dispatch.
# Builds Linux + Windows + macOS in parallel, signs with the Tauri
# minisign key, attaches all bundles + .sig files to the GitHub release.
#
# Required secrets (Repo Settings → Secrets and variables → Actions):
#   - TAURI_SIGNING_PRIVATE_KEY           contents of ~/.tauri/agentcontrol.key
#   - TAURI_SIGNING_PRIVATE_KEY_PASSWORD  the passphrase used at key generation
#   - (GITHUB_TOKEN is provided automatically; used for release upload)

name: Build & Release Tray

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to build (e.g. v0.1.0)'
        required: true
        type: string

jobs:
  build:
    permissions:
      contents: write   # required to create / upload to releases
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            label: linux
            rust-target: x86_64-unknown-linux-gnu
            args: ''
          - platform: macos-14   # arm64; older macos-13 = intel — pick once you know target users
            label: macos
            rust-target: aarch64-apple-darwin
            args: '--target aarch64-apple-darwin'
          - platform: windows-latest
            label: windows
            rust-target: x86_64-pc-windows-msvc
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ matrix.platform }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.platform }}-cargo-

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install web deps
        run: pnpm install --frozen-lockfile

      - name: Build & sign via tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # tagName / releaseName / releaseBody used only when this action
          # creates the release. We rely on push-tag triggering creating
          # the release in the FIRST matrix job; subsequent jobs upload
          # to the same release via tagName lookup.
          tagName: ${{ github.event.inputs.version || github.ref_name }}
          releaseName: 'AgentControl Tray ${{ github.event.inputs.version || github.ref_name }}'
          releaseBody: |
            Multi-OS signed release built via GitHub Actions.
            See `latest.json` for updater-plugin consumption.

            Signed with operator-managed Tauri minisign key.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload artifacts (raw, for non-release runs)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.version == ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}-bundles
          path: |
            src-tauri/target/**/release/bundle/**/*.AppImage*
            src-tauri/target/**/release/bundle/**/*.deb*
            src-tauri/target/**/release/bundle/**/*.rpm*
            src-tauri/target/**/release/bundle/**/*.dmg*
            src-tauri/target/**/release/bundle/**/*.app.tar.gz*
            src-tauri/target/**/release/bundle/**/*.msi*
            src-tauri/target/**/release/bundle/**/*.exe*
            src-tauri/target/**/release/bundle/**/*.nsis.zip*
          retention-days: 7
