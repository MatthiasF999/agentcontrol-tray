# ci.yml — Phase 37 release-gates + lint + build on every PR + main-push.
#
# Complements build-release.yml (tag-push + dispatch only).
#
# `build` includes `tsc && vite build` per package.json — covers
# typecheck (Add-48) + Vite-build (analog Add-52 once a bundle-size
# guard is wired). No `npm test` yet; per CLAUDE.md "Today tsc is
# the only gate". Phase 37 follow-up: wire vitest in tray.

name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  release-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Phase 37 — release-gates scan origin/main..HEAD
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      # Add-43 + Add-44 — commit-content scan across origin/main..HEAD.
      # Shared script implementation; see
      # ../../../supabase/docs/PHASE-37-ARCHITECT-BLUEPRINT.md.
      - name: Release gate — Add-43 + Add-44 (commit-content scan)
        run: bash scripts/check-release-gates.sh

  lint-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      # `build` = tsc && vite build (per package.json).
      - run: pnpm run build

  # Phase 37 Add-82 — doc-set updates enforced (promoted from supabase
  # ci.yml). PR-only, only on `feat/phase-*` branches. Diff vs
  # origin/main must touch at least one of `.claude/memory.md`,
  # `docs/PHASE-*-SUMMARY.md`, `CLAUDE.md`, or `CHANGELOG.md`.
  doc-set-gate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Phase 37 Add-82 — doc-set updates enforced (PR-only)
        run: |
          BRANCH="${GITHUB_HEAD_REF:-}"
          if [[ ! "$BRANCH" =~ ^feat/phase- ]]; then
            echo "branch '$BRANCH' is not a phase-iter branch — skipping doc-set gate"
            exit 0
          fi
          CHANGED=$(git diff --name-only origin/main...HEAD)
          if echo "$CHANGED" | grep -qE '^(\.claude/memory\.md|docs/PHASE-.*-SUMMARY\.md|CLAUDE\.md|CHANGELOG\.md)$'; then
            echo "doc-set updated: at least one of memory.md / phase summary / CLAUDE.md / CHANGELOG present in diff"
            exit 0
          fi
          echo "::error::Phase-iter PR '$BRANCH' does not touch any of: .claude/memory.md, docs/PHASE-*-SUMMARY.md, CLAUDE.md, CHANGELOG.md"
          exit 1
