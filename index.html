<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AgentControl</title>
    <style>
      /* Splash shown until React mounts + paints over `#root`. Inlined so
         it appears the instant the WebView2 process boots — the wait
         until the JS bundle parses + AuthProvider initialises was
         making the tray feel frozen for 1-2 min on cold start.

         Light-only by design (mirrors src/theme/tokens.css). Hex values are
         inlined literally because this critical CSS runs BEFORE the JS bundle
         + tokens.css load — it can't reference a var(). Keep in sync with
         tokens.css: canvas #FAFAFC, text-body #1F2937, accent #3E5FFF. */
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background-color: #fafafc;
        background-image:
          radial-gradient(60% 50% at 15% 0%, #c7d2fe 0%, transparent 60%),
          radial-gradient(55% 45% at 100% 20%, #bfdbfe 0%, transparent 55%);
        color: #1f2937;
        font-family:
          Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          Helvetica, Arial, sans-serif;
      }
      #splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        z-index: 1;
      }
      #splash h1 {
        margin: 0;
        font-size: 24px;
        font-weight: 600;
        letter-spacing: -0.5px;
        color: #0a0a0f;
      }
      #splash p {
        margin: 0;
        color: #6b7280;
        font-size: 14px;
      }
      .pulse {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        /* Accent brand mark — solid accent, no dark gradient. */
        background: radial-gradient(circle, #3e5fff 0%, #2d4aff 75%);
        box-shadow: 0 8px 18px rgba(62, 95, 255, 0.32);
        animation: pulse 1.6s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          transform: scale(0.9);
          opacity: 0.7;
        }
        50% {
          transform: scale(1);
          opacity: 1;
        }
      }
      /* The first React render targets `#root`; once it has children we
         hide the splash. CSS-only — no JS coordination needed. */
      #root:not(:empty) ~ #splash {
        display: none;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <div id="splash">
      <div class="pulse"></div>
      <h1>AgentControl</h1>
      <p>Starting up…</p>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
